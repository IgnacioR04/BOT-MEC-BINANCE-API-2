<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEC Bot — Live Trading</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg:     #0f0f0f;
    --bg2:    #1a1a1a;
    --bg3:    #222222;
    --border: #2e2e2e;
    --text:   #e8e8e8;
    --muted:  #888;
    --green:  #22c55e;
    --red:    #ef4444;
    --blue:   #3b82f6;
    --amber:  #f59e0b;
    --purple: #a78bfa;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; min-height: 100vh; }

  header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { font-size: 16px; font-weight: 600; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .header-right { display: flex; align-items: center; gap: 14px; }
  .run-counter { font-size: 12px; color: var(--muted); }
  .updated { font-size: 12px; color: var(--muted); }

  main { padding: 16px 20px; max-width: 1100px; margin: 0 auto; }

  .btc-bar { display: flex; align-items: center; gap: 20px; padding: 14px 18px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; flex-wrap: wrap; }
  .btc-price { font-size: 28px; font-weight: 700; }
  .btc-change { font-size: 14px; font-weight: 600; }
  .signal-pill { padding: 4px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .signal-long   { background: rgba(34,197,94,.15);  color: var(--green); }
  .signal-short  { background: rgba(239,68,68,.15);  color: var(--red);   }
  .signal-neutral{ background: rgba(136,136,136,.15);color: var(--muted); }
  .btc-label { font-size: 12px; color: var(--muted); }

  .balance-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 16px; }
  .balance-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .balance-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .balance-value { font-size: 22px; font-weight: 700; }

  .position-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; border-left: 4px solid var(--amber); }
  .position-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .position-title { font-size: 13px; font-weight: 600; color: var(--amber); }
  .position-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
  .pos-item { background: var(--bg3); border-radius: 6px; padding: 10px 12px; }
  .pos-item-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .pos-item-value { font-size: 15px; font-weight: 600; }

  .accounts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; margin-bottom: 16px; }
  .account-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .account-card.accent-a { border-top: 3px solid var(--blue); }
  .account-card.accent-b { border-top: 3px solid var(--green); }
  .acc-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .acc-name { font-size: 13px; font-weight: 600; }
  .acc-equity { font-size: 22px; font-weight: 700; }
  .acc-pnl { font-size: 13px; font-weight: 500; }
  .acc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .stat-box { background: var(--bg3); border-radius: 6px; padding: 8px 10px; }
  .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .stat-value { font-size: 14px; font-weight: 500; }

  .no-position { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; text-align: center; color: var(--muted); font-size: 13px; }

  .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  /* ── NUEVO: chart-title es flex para alinear titulo + tabs ── */
  .chart-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; color: var(--muted); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .chart-wrap { position: relative; height: 200px; }
  .chart-wrap-sm { position: relative; height: 160px; }

  /* ── NUEVO: tabs de periodo ── */
  .period-tabs { display: flex; gap: 4px; }
  .ptab { padding: 3px 9px; border-radius: 5px; font-size: 11px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: .15s; }
  .ptab.active { background: var(--bg3); color: var(--text); border-color: var(--muted); }

  .trades-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .trades-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .trades-title { font-size: 13px; font-weight: 600; }
  .tab-row { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .tab { padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); }
  .tab.active { background: var(--bg3); color: var(--text); border-color: var(--text); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 6px 8px; color: var(--muted); border-bottom: 1px solid var(--border); font-weight: 500; }
  td { padding: 7px 8px; border-bottom: 1px solid rgba(255,255,255,.04); }
  tr:last-child td { border-bottom: none; }
  .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-long  { background: rgba(34,197,94,.15);  color: var(--green); }
  .badge-short { background: rgba(239,68,68,.15);  color: var(--red); }
  .badge-tp    { background: rgba(34,197,94,.1);   color: var(--green); font-size: 10px; }
  .badge-sl    { background: rgba(239,68,68,.1);   color: var(--red);   font-size: 10px; }
  .badge-time  { background: rgba(136,136,136,.1); color: var(--muted); font-size: 10px; }

  .signals-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .sig-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .sig-item { background: var(--bg3); border-radius: 6px; padding: 6px 10px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .sig-dot-l { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
  .sig-dot-s { width: 6px; height: 6px; border-radius: 50%; background: var(--red); }

  .no-live { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 30px; text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 16px; }

  .green { color: var(--green); } .red { color: var(--red); } .muted { color: var(--muted); } .amber { color: var(--amber); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  @media(max-width:600px) { main{padding:12px} .btc-price{font-size:22px} .grid-2{grid-template-columns:1fr} table th:nth-child(4),table td:nth-child(4){display:none} }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="dot" id="liveDot"></div>
    <span class="logo">MEC BOT</span>
  </div>
  <div class="header-right">
    <span class="run-counter" id="runCounter">Ejecuciones: —</span>
    <span class="updated" id="updatedAt">Cargando...</span>
  </div>
</header>

<main id="app">
  <div style="text-align:center;padding:40px;color:var(--muted)">Cargando datos...</div>
</main>

<script>
const DATA_URL = 'data.json';
let charts = {};
let D = null;

// Periodos activos por gráfica
let periodPrice  = '180';
let periodEquity = 'all';
let periodPnl    = '30';

const fmt    = (n, d=2) => n == null ? '—' : Number(n).toFixed(d);
const fmtN   = n => n == null ? '—' : Number(n).toLocaleString('es-ES', {minimumFractionDigits:2, maximumFractionDigits:2});
const fmtPct = n => n == null ? '—' : (Number(n)>=0?'+':'')+Number(n).toFixed(2)+'%';
const fmtU   = (n, sign=true) => n == null ? '—' : (sign&&Number(n)>=0?'+':'')+Number(n).toFixed(4)+' USDT';
const cc     = n => Number(n) >= 0 ? 'green' : 'red';
const ds     = iso => iso ? iso.slice(0,10) : '—';
function timeAgo(iso) {
  if (!iso) return '';
  const d = (Date.now() - new Date(iso).getTime()) / 1000;
  if (d < 60)   return `hace ${Math.round(d)}s`;
  if (d < 3600) return `hace ${Math.round(d/60)}min`;
  return `hace ${Math.round(d/3600)}h`;
}

// ── Filtrar array por dias ────────────────────────────────────────────────────
function filterDays(arr, days, key) {
  if (!arr || !arr.length) return arr || [];
  if (days === 'all') return arr;
  const cutoff = Date.now() - parseInt(days) * 86400000;
  return arr.filter(x => new Date(x[key] || x.ts || x.date) >= cutoff);
}

// ── Helper tabs HTML ──────────────────────────────────────────────────────────
function periodTabsHtml(id, active, options) {
  return `<div class="period-tabs">${options.map(o =>
    `<button class="ptab ${active===o?'active':''}" onclick="setPeriod('${id}','${o}')">${o==='all'?'Todo':o+'D'}</button>`
  ).join('')}</div>`;
}

const baseOpts = {
  responsive: true, maintainAspectRatio: false, animation: false,
  plugins: { legend: { display: false } },
  scales: {
    x: { ticks:{color:'#666',maxTicksLimit:7,font:{size:10}}, grid:{color:'#1e1e1e'} },
    y: { ticks:{color:'#666',font:{size:10}}, grid:{color:'#1e1e1e'} },
  }
};
function mkChart(id, cfg) {
  if (!document.getElementById(id)) return;
  if (charts[id]) charts[id].destroy();
  charts[id] = new Chart(document.getElementById(id).getContext('2d'), cfg);
}

function renderSignal(sig) {
  if (sig==='LONG')  return `<span class="signal-pill signal-long">▲ LONG</span>`;
  if (sig==='SHORT') return `<span class="signal-pill signal-short">▼ SHORT</span>`;
  return `<span class="signal-pill signal-neutral">— neutral</span>`;
}

function renderOpenPosition(d) {
  const pos = d.live_s4?.position;
  if (!pos) return `<div class="no-position">Sin posición abierta en Bitget actualmente</div>`;
  const sc = pos.side === 'LONG' ? 'green' : 'red';
  const pnlPct = pos.unreal_pct ?? 0;
  const currentBtc = d.btc_price || 0;
  const distToSL = pos.side==='LONG' ? ((pos.sl_px-currentBtc)/currentBtc*100) : ((currentBtc-pos.sl_px)/currentBtc*100);
  const distToTP = pos.side==='LONG' ? ((pos.tp_px-currentBtc)/currentBtc*100) : ((currentBtc-pos.tp_px)/currentBtc*100);
  return `
    <div class="position-card">
      <div class="position-header">
        <span class="position-title">▶ POSICIÓN ABIERTA EN BITGET</span>
        <span class="${sc}" style="font-size:18px;font-weight:700">${pos.side}</span>
      </div>
      <div class="position-grid">
        <div class="pos-item"><div class="pos-item-label">Precio entrada</div><div class="pos-item-value">$${fmt(pos.entry_px,0)}</div></div>
        <div class="pos-item"><div class="pos-item-label">Precio actual</div><div class="pos-item-value">$${fmtN(currentBtc)}</div></div>
        <div class="pos-item"><div class="pos-item-label">Stop Loss</div><div class="pos-item-value red">$${fmt(pos.sl_px,0)} <span style="font-size:11px;color:var(--muted)">(${fmt(distToSL,1)}%)</span></div></div>
        <div class="pos-item"><div class="pos-item-label">Take Profit</div><div class="pos-item-value green">$${fmt(pos.tp_px,0)} <span style="font-size:11px;color:var(--muted)">(${fmt(distToTP,1)}%)</span></div></div>
        <div class="pos-item"><div class="pos-item-label">Apalancamiento</div><div class="pos-item-value">${pos.leverage}×</div></div>
        <div class="pos-item"><div class="pos-item-label">Margen usado</div><div class="pos-item-value">${fmt(pos.margin_usdt,2)} USDT</div></div>
        <div class="pos-item"><div class="pos-item-label">Nocional</div><div class="pos-item-value">${fmt(pos.notional,2)} USDT</div></div>
        <div class="pos-item"><div class="pos-item-label">PnL no realizado</div><div class="pos-item-value ${cc(pnlPct)}">${fmtPct(pnlPct)}</div></div>
        <div class="pos-item"><div class="pos-item-label">Abierto</div><div class="pos-item-value muted" style="font-size:13px">${ds(pos.open_date)}</div></div>
        ${pos.order_id?`<div class="pos-item"><div class="pos-item-label">Order ID</div><div class="pos-item-value muted" style="font-size:11px;word-break:break-all">${pos.order_id}</div></div>`:''}
      </div>
    </div>`;
}

function renderLiveAccounts(d) {
  const acc = d.live_s4 || {};
  const pnl = acc.total_pnl_usdt || 0;
  const eq  = acc.equity || 0;
  return `
    <div class="account-card accent-b" style="max-width:100%">
      <div class="acc-header">
        <div><div class="acc-name">${acc.name || 'S4-Live (100%)'}</div><div class="acc-equity" style="margin-top:4px">${fmt(eq,2)} USDT</div></div>
        <div style="text-align:right"><div class="acc-pnl ${cc(pnl)}">${fmtU(pnl)}</div></div>
      </div>
      <div class="acc-stats">
        <div class="stat-box"><div class="stat-label">Trades cerrados</div><div class="stat-value">${acc.num_trades||0}</div></div>
        <div class="stat-box"><div class="stat-label">Win rate</div><div class="stat-value">${fmt(acc.win_rate,1)}%</div></div>
        <div class="stat-box"><div class="stat-label">Capital</div><div class="stat-value">100%</div></div>
        <div class="stat-box"><div class="stat-label">Disponible</div><div class="stat-value">${fmt(acc.available,2)} USDT</div></div>
      </div>
    </div>`;
}

function renderTradesTable(trades) {
  if (!trades || !trades.length) return `<div style="text-align:center;padding:20px;color:var(--muted);font-size:13px">Sin trades cerrados aún — la primera operación aparecerá aquí cuando se cierre por TP o SL</div>`;
  const rev = [...trades].reverse();
  const rows = rev.map(t => {
    const pnl = t.pnl_usdt || 0;
    const sc  = t.side==='LONG' ? 'badge-long' : 'badge-short';
    const rc  = t.exit_reason==='TP_SL_BITGET' ? 'badge-tp' : t.exit_reason==='SL' ? 'badge-sl' : 'badge-time';
    return `<tr>
      <td class="muted">${ds(t.close_date)}</td>
      <td><span class="badge ${sc}">${t.side||'—'}</span></td>
      <td>$${fmt(t.entry_px,0)}</td>
      <td>${fmt(t.leverage,1)}×</td>
      <td>${fmt(t.margin_usdt,2)} USDT</td>
      <td class="${cc(pnl)}" style="font-weight:500">${fmtU(pnl)}</td>
      <td><span class="badge ${rc}">${t.exit_reason||'—'}</span></td>
    </tr>`;
  }).join('');
  return `<table><thead><tr><th>Fecha</th><th>Dir.</th><th>Entrada</th><th>Lev.</th><th>Margen</th><th>PnL</th><th>Motivo</th></tr></thead><tbody>${rows}</tbody></table>`;
}

// ── Gráfica equity con filtro de periodo ──────────────────────────────────────
function drawEquityChart(d) {
  const hS4 = filterDays(d.live_s4?.equity_history||[], periodEquity, 'ts');
  if (!hS4.length) return;
  const labels = hS4.map(p=>p.ts.slice(0,16).replace('T',' '));
  mkChart('equityChart', {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label:'S4 (100%)', data:hS4.map(p=>p.equity), borderColor:'#22c55e', borderWidth:2, pointRadius:0, tension:.1, fill:false },
      ]
    },
    options: {
      ...baseOpts,
      plugins: { legend:{ display:true, labels:{color:'#888',font:{size:11}} } },
      scales: { ...baseOpts.scales, y:{ ...baseOpts.scales.y, ticks:{color:'#666',font:{size:10},callback:v=>v.toFixed(2)+' USDT'} } }
    }
  });
}

// ── Gráfica BTC con filtro de periodo ─────────────────────────────────────────
function drawPriceChart(ph, sh) {
  if (!ph || !ph.length) return;
  const filtered = filterDays(ph, periodPrice, 'date');
  const sigMap = {};
  (sh||[]).forEach(s => sigMap[s.date] = s.signal);
  mkChart('priceChart', {
    type: 'line',
    data: {
      labels: filtered.map(p=>p.date),
      datasets: [
        { label:'BTC/USD', data:filtered.map(p=>p.close), borderColor:'#3b82f6', borderWidth:1.5, pointRadius:0, tension:.1, fill:false },
        { label:'LONG',  data:filtered.map(p=>sigMap[p.date]==='LONG'?p.close:null),  backgroundColor:'#22c55e', pointRadius:7, pointStyle:'triangle', showLine:false, borderColor:'transparent' },
        { label:'SHORT', data:filtered.map(p=>sigMap[p.date]==='SHORT'?p.close:null), backgroundColor:'#ef4444', pointRadius:7, pointStyle:'triangle', rotation:180, showLine:false, borderColor:'transparent' },
      ]
    },
    options: {
      ...baseOpts,
      scales: { ...baseOpts.scales, y:{ ...baseOpts.scales.y, ticks:{color:'#666',font:{size:10},callback:v=>'$'+Number(v).toLocaleString()} } }
    }
  });
}

// ── NUEVA: gráfica PnL acumulado + barras diarias ─────────────────────────────
function drawPnlChart(d) {
  const allTrades = [...(d.live_s4?.trades||[])]
    .sort((a,b) => new Date(a.close_date||0) - new Date(b.close_date||0));

  const filtered = filterDays(allTrades, periodPnl, 'close_date');

  // Agrupar por dia
  const byDay = {};
  filtered.forEach(t => {
    const day = (t.close_date||'').slice(0,10);
    if (!day) return;
    byDay[day] = (byDay[day]||0) + (t.pnl_usdt||0);
  });
  const days   = Object.keys(byDay).sort();
  const vals   = days.map(d => byDay[d]);

  // PnL acumulado
  let running = 0;
  const cumul = vals.map(v => { running += v; return running; });

  if (!days.length) {
    mkChart('pnlChart', {
      type: 'bar',
      data: { labels:[], datasets:[] },
      options: { ...baseOpts }
    });
    return;
  }

  mkChart('pnlChart', {
    type: 'bar',
    data: {
      labels: days,
      datasets: [
        {
          label: 'PnL diario (USDT)',
          data: vals,
          backgroundColor: vals.map(v => v>=0 ? 'rgba(34,197,94,.65)' : 'rgba(239,68,68,.65)'),
          borderRadius: 3,
          order: 2,
          yAxisID: 'y',
        },
        {
          label: 'PnL acumulado (USDT)',
          data: cumul,
          type: 'line',
          borderColor: '#f59e0b',
          borderWidth: 2,
          pointRadius: 0,
          tension: .3,
          fill: false,
          order: 1,
          yAxisID: 'y2',
        },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, labels: { color:'#888', font:{size:11} } },
        tooltip: { mode: 'index', intersect: false },
      },
      scales: {
        x: { ticks:{color:'#666',maxTicksLimit:8,font:{size:10}}, grid:{color:'#1e1e1e'} },
        y: {
          position: 'left',
          ticks: { color:'#666', font:{size:10}, callback: v=>(v>=0?'+':'')+v.toFixed(2)+' U' },
          grid: { color:'#1e1e1e' },
        },
        y2: {
          position: 'right',
          ticks: { color:'#f59e0b', font:{size:10}, callback: v=>(v>=0?'+':'')+v.toFixed(2)+' U' },
          grid: { drawOnChartArea: false },
        },
      }
    }
  });
}

// ── Redibuja las tres gráficas ────────────────────────────────────────────────
function redrawCharts() {
  if (!D) return;
  drawPriceChart(D.price_history||[], D.signal_history||[]);
  drawEquityChart(D);
  drawPnlChart(D);
}

// ── Cambiar periodo ───────────────────────────────────────────────────────────
window.setPeriod = (chart, val) => {
  if (chart === 'price')  periodPrice  = val;
  if (chart === 'equity') periodEquity = val;
  if (chart === 'pnl')    periodPnl    = val;
  if (D) render(D);
};

// ── Render principal ──────────────────────────────────────────────────────────
function render(d) {
  D = d;

  document.getElementById('runCounter').textContent = `# Ejecuciones: ${d.runs||0}`;
  document.getElementById('updatedAt').textContent  = 'Actualizado ' + timeAgo(d.updated_at);

  const chClass = (d.btc_change_24h||0) >= 0 ? 'green' : 'red';
  const balance = d.live_balance || {};
  const eq      = balance.equity || 0;
  const avail   = balance.available || 0;
  const unreal  = balance.unrealized_pl || 0;
  const totalPnl = d.live_s4?.total_pnl_usdt || 0;
  const liveTrades = d.live_s4?.trades || [];

  if (!d.live_mode) {
    document.getElementById('app').innerHTML = `
      <div class="no-live">
        <div style="font-size:24px;margin-bottom:10px">🔌</div>
        <div style="font-size:15px;font-weight:600;margin-bottom:6px">Modo live no activo</div>
        <div>Añade BITGET_API_KEY, BITGET_API_SECRET y BITGET_PASSPHRASE como GitHub Secrets para activar el trading real.</div>
      </div>`;
    return;
  }

  document.getElementById('app').innerHTML = `

    <!-- BTC precio y señal -->
    <div class="btc-bar">
      <div>
        <div class="btc-label">BTC / USD</div>
        <div class="btc-price">$${Number(d.btc_price||0).toLocaleString('es-ES',{minimumFractionDigits:2})}</div>
      </div>
      <div class="${chClass}" style="font-size:15px;font-weight:600">${(d.btc_change_24h>=0?'+':'')+fmt(d.btc_change_24h,2)}% hoy</div>
      <div>
        <div class="btc-label" style="margin-bottom:4px">Señal MEC actual</div>
        ${renderSignal(d.current_signal)}
      </div>
      ${d.last_signal_date ? `<div class="muted" style="font-size:12px">Última señal: ${d.last_signal_date}</div>` : ''}
    </div>

    <!-- Balance Bitget -->
    <div class="balance-grid">
      <div class="balance-card">
        <div class="balance-label">Equity total Bitget</div>
        <div class="balance-value">${fmt(eq,2)} <span style="font-size:13px;color:var(--muted)">USDT</span></div>
      </div>
      <div class="balance-card">
        <div class="balance-label">Disponible</div>
        <div class="balance-value">${fmt(avail,2)} <span style="font-size:13px;color:var(--muted)">USDT</span></div>
      </div>
      <div class="balance-card">
        <div class="balance-label">PnL no realizado</div>
        <div class="balance-value ${cc(unreal)}">${(unreal>=0?'+':'')}${fmt(unreal,4)} <span style="font-size:13px">USDT</span></div>
      </div>
      <div class="balance-card">
        <div class="balance-label">PnL realizado total</div>
        <div class="balance-value ${cc(totalPnl)}">${(totalPnl>=0?'+':'')}${fmt(totalPnl,4)} <span style="font-size:13px">USDT</span></div>
      </div>
    </div>

    <!-- Posición abierta -->
    ${renderOpenPosition(d)}

    <!-- Cuenta S4 -->
    ${renderLiveAccounts(d)}

    <!-- Gráfica BTC + señales CON FILTRO DE PERIODO -->
    <div class="chart-card">
      <div class="chart-title">
        <span>BTC/USD con señales MEC</span>
        ${periodTabsHtml('price', periodPrice, ['1','7','30','60','120','180'])}
      </div>
      <div class="chart-wrap"><canvas id="priceChart"></canvas></div>
    </div>

    <!-- Equity Bitget CON FILTRO DE PERIODO -->
    <div class="chart-card">
      <div class="chart-title">
        <span>Equity Bitget — S4</span>
        ${periodTabsHtml('equity', periodEquity, ['1','7','30','60','120','360','all'])}
      </div>
      <div class="chart-wrap-sm"><canvas id="equityChart"></canvas></div>
    </div>

    <!-- NUEVA: gráfica PnL diario + acumulado CON FILTRO DE PERIODO -->
    <div class="chart-card">
      <div class="chart-title">
        <span>PnL diario y acumulado (USDT)</span>
        ${periodTabsHtml('pnl', periodPnl, ['7','30','60','120','360','all'])}
      </div>
      <div class="chart-wrap"><canvas id="pnlChart"></canvas></div>
    </div>

    <!-- Historial de trades -->
    <div class="trades-card">
      <div class="trades-header">
        <span class="trades-title">Historial de operaciones en Bitget</span>
        <span class="muted" style="font-size:12px">${liveTrades.length} operaciones cerradas</span>
      </div>
      ${renderTradesTable(liveTrades)}
    </div>

    <!-- Historial señales MEC -->
    <div class="signals-card">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">Últimas señales MEC detectadas</div>
      <div class="sig-list">
        ${(d.signal_history||[]).slice().reverse().map(s=>`
          <div class="sig-item">
            <div class="${s.signal==='LONG'?'sig-dot-l':'sig-dot-s'}"></div>
            <span style="font-weight:600;color:${s.signal==='LONG'?'var(--green)':'var(--red)'}">${s.signal}</span>
            <span class="muted">${s.date}</span>
            <span>$${Number(s.price).toLocaleString()}</span>
          </div>`).join('') || '<div class="muted" style="font-size:12px">Sin señales registradas</div>'}
      </div>
    </div>

  `;

  drawPriceChart(d.price_history||[], d.signal_history||[]);
  drawEquityChart(d);
  drawPnlChart(d);
}


async function fetchData() {
  try {
    const res  = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    document.getElementById('liveDot').style.background = 'var(--green)';
    render(data);
  } catch(e) {
    document.getElementById('liveDot').style.background = 'var(--red)';
    document.getElementById('updatedAt').textContent = 'Error al cargar datos';
    console.error(e);
  }
}

fetchData();
setInterval(fetchData, 30000);
</script>
</body>
</html>
